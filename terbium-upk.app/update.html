    <script>
        async function installTB2() {
            document.getElementById("main").classList.add("hidden");
            document.getElementById("main").classList.remove("flex");
            document.getElementById("installer").classList.add("flex");
            document.getElementById("installer").classList.remove("hidden");

            eval(await fetch("fflate.js").then(res => res.text()))
            const sh = new anura.fs.Shell();

            const dat = await new Promise(async(res, rej) => {
                fflate.unzip(new Uint8Array(await (await fetch("tbv2.zip")).arrayBuffer()), (err, dat) => {
                    if (err)
                        return rej(err);

                    res(dat);
                })
            });
            document.body.innerHTML += "<br>Finished parsing zip file..."
            const root = "/anura_files/"

            const folders = []
            const files = []
            for (const item in dat) {
                if (item.endsWith("/")) {
                    folders.push(item)
                } else {
                    files.push([item, dat[item]])
                }
            }

            const aBoot = await anura.fs.promises.writeFile("/anura_files/anura.html", await anura.fs.promises.readFile("/anura_files/index.html", "utf8"))

            for (const folder of folders) {
                await sh.promises.mkdirp(root + folder)
            }

            for (const file of files) {
                const log = document.querySelector("#log");
                const br = document.createElement("br");
                br.innerHTML = "Writing " + root + file[0];
                log.appendChild(br);
                await anura.fs.promises.writeFile(root + file[0], window.top.Filer.Buffer.from(file[1]));
            }
            window.top.location.reload()
        }
    </script>
